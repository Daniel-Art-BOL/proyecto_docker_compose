name: CI Setup Boot Dockerfile
on: 
  push: 
    branches: 
      - main

jobs:

  
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Instalar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: Compilar Proyecto
        run: mvn clean package -DskipTests

      - name: Verificar el JAR generado
        run: ls -la target

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker del backend
        run: docker build -t daniel426/backend-spring:latest .

      - name: Subir imagen Docker del backend a DockerHub
        run: docker push daniel426/backend-spring:latest


  
  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend_test
    steps:
      - name: Descargar Código
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Construir imagen Docker del frontend
        run: docker build -t daniel426/frontend:latest .

      - name: Subir imagen Docker del frontend a DockerHub
        run: docker push daniel426/frontend:latest


  # 3. DEPLOY BACKEND (self-hosted)
  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend-spring
        run: |
          cd C:\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          docker compose pull backend
          docker compose up -d backend

  # 4. DEPLOY FRONTEND (self-hosted)
  deploy-frontend:
    needs: build-frontend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor frontend-html
        run: |
          cd C:\proyecto_docker_compose_limpio\proyecto_docker_compose_limpio
          docker compose pull frontend
          docker compose up -d frontend
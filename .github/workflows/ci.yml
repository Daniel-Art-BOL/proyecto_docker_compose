name: CI spring boot Docker
on:
  push:
    branches: 
     - main 
jobs:
  build-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: test15b
    steps:
      - name: Descargar codigo
        uses: actions/checkout@v3
      - name: Instalar Java 21
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 21

      - name: compilar proyecto
        run: mvn clean package -DskipTests
      - name: verificar el jar generado
        run: ls -l target
      - name: Construir imagen Docker
        run: docker build -t backend-spring .
      - name: login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - name: Contruir imagen Docker
        run: docker build -t daniel426/backend-spring:latest .
      - name: publicar imagen Docker en dockerhub
        run: docker push daniel426/backend-spring:latest
  deploy-backend:
    needs: build-backend
    runs-on: self-hosted
    steps:
      - name: Actualizar contenedor backend
        run:|
           cd C:\proyecto_docker_compose_limpio
           docker-compose pull backend
           docker-compose up -d backend
          